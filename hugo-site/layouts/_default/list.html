{{ define "main" }}
<header class="page-head wrap"><p class="eyebrow">{{ .Section }}</p><h1>{{ .Title }}</h1>{{ with .Content }}<div class="lede">{{ . }}</div>{{ end }}</header>
<section class="wrap section"><div class="simple-list">{{ range .Pages.ByTitle }}<article><h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2><p>{{ .Summary }}</p></article>{{ end }}</div></section>
{{ end }}
